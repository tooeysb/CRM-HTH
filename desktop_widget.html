<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📧 Email Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .widget {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 280px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat {
            margin-bottom: 20px;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 800;
            color: #2d3748;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.good { color: #48bb78; }
        .stat-value.warning { color: #ed8936; }
        .stat-value.danger { color: #f56565; }

        .status {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f7fafc;
            border-radius: 8px;
            margin-top: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #a0aec0;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background: #48bb78;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        .status-text {
            font-size: 11px;
            font-weight: 600;
            color: #4a5568;
        }

        .updated {
            text-align: center;
            font-size: 9px;
            color: #a0aec0;
            margin-top: 16px;
            font-weight: 500;
        }

        .error {
            color: #f56565;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        /* Minimize window chrome */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="title">📧 Email Stats</div>

        <div id="content">
            <div class="stat">
                <div class="stat-label">Total Emails</div>
                <div class="stat-value" id="total">—</div>
            </div>

            <div class="stat">
                <div class="stat-label">Minutes Since Last</div>
                <div class="stat-value" id="minutes">—</div>
            </div>

            <div class="status">
                <div class="status-dot" id="status-dot"></div>
                <div class="status-text" id="status-text">Loading...</div>
            </div>

            <div class="updated" id="updated">Updating...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'https://gmail-obsidian-sync-729716d2143d.herokuapp.com/dashboard/stats';

        function formatNumber(num) {
            return num.toLocaleString();
        }

        function getColorClass(minutes) {
            if (minutes === null) return '';
            if (minutes < 5) return 'good';
            if (minutes < 15) return 'warning';
            return 'danger';
        }

        async function updateStats() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch');

                const data = await response.json();

                // Total emails
                document.getElementById('total').textContent = formatNumber(data.total_emails);

                // Minutes since last email
                const minutesEl = document.getElementById('minutes');
                if (data.minutes_since_last_email !== null) {
                    minutesEl.textContent = data.minutes_since_last_email;
                    minutesEl.className = 'stat-value ' + getColorClass(data.minutes_since_last_email);
                } else {
                    minutesEl.textContent = '—';
                    minutesEl.className = 'stat-value';
                }

                // Status
                const statusDot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');

                if (data.active_scans > 0) {
                    statusDot.className = 'status-dot active';
                    statusText.textContent = `Scanning (${data.current_job_progress}%)`;
                } else {
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Idle';
                }

                // Timestamp
                const now = new Date();
                document.getElementById('updated').textContent = now.toLocaleTimeString();

                document.getElementById('error').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('error').textContent = 'Failed to load';
                document.getElementById('error').style.display = 'block';
            }
        }

        // Initial load
        updateStats();

        // Refresh every 10 seconds
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
