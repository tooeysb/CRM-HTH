<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Email Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 200px;
            height: auto;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', Arial, sans-serif;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px;
        }

        .title {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }

        .stat {
            margin-bottom: 16px;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            line-height: 1;
        }

        .stat-value.good { color: #48bb78; }
        .stat-value.warning { color: #ed8936; }
        .stat-value.danger { color: #f56565; }

        .status {
            display: flex;
            align-items: center;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-top: 12px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
            background: #ccc;
        }

        .dot.active {
            background: #48bb78;
        }

        .status-text {
            font-size: 9px;
            font-weight: 600;
            color: #666;
        }

        .updated {
            text-align: center;
            font-size: 8px;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="title">📧 Email Stats</div>

    <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="total">—</div>
    </div>

    <div class="stat">
        <div class="stat-label">Minutes Ago</div>
        <div class="stat-value" id="minutes">—</div>
    </div>

    <div class="status">
        <div class="dot" id="dot"></div>
        <div class="status-text" id="status">Loading...</div>
    </div>

    <div class="updated" id="updated">—</div>

    <script>
        async function update() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();

                document.getElementById('total').textContent = d.total_emails.toLocaleString();

                const mins = d.minutes_since_last_email;
                const minsEl = document.getElementById('minutes');
                minsEl.textContent = mins ?? '—';
                minsEl.className = 'stat-value ' + (mins < 5 ? 'good' : mins < 15 ? 'warning' : 'danger');

                const dot = document.getElementById('dot');
                const status = document.getElementById('status');
                if (d.active_scans > 0) {
                    dot.className = 'dot active';
                    status.textContent = `Scanning (${d.current_job_progress}%)`;
                } else {
                    dot.className = 'dot';
                    status.textContent = 'Idle';
                }

                document.getElementById('updated').textContent = new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
            }
        }

        update();
        setInterval(update, 10000);
    </script>
</body>
</html>
